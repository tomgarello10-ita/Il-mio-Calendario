const CLAUDE_KEY = "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";

// Chiamata semplice, diretta, senza streaming — funziona ovunque incluso GitHub Pages
async function callClaude(prompt, maxTokens=2000, _onChunk=null){
  // Timeout generoso ma non infinito
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 55000);

  let lastErr;
  for(let attempt=1; attempt<=3; attempt++){
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        signal: controller.signal,
        headers:{
          "Content-Type":"application/json",
          "x-api-key": CLAUDE_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens: maxTokens,
          stream: false,
          messages:[{role:"user", content: prompt}]
        })
      });

      clearTimeout(timeout);

      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        const msg = err.error?.message || `HTTP ${res.status}`;
        // 529 = overloaded, ritenta
        if(res.status===529 && attempt<3){ await sleep(2000*attempt); continue; }
        throw new Error(msg);
      }

      const d = await res.json();
      if(d.error) throw new Error(d.error.message);
      const text = d.content?.[0]?.text || "";
      // Se onChunk era passato, simula l'aggiornamento con il testo completo
      if(_onChunk) _onChunk(text);
      return text;

    }catch(e){
      clearTimeout(timeout);
      lastErr = e;
      if(e.name==="AbortError") throw new Error("Timeout: la risposta ha impiegato troppo. Riprova.");
      if(attempt<3 && !e.message.includes("401") && !e.message.includes("403")){
        await sleep(1500*attempt);
        continue;
      }
      throw e;
    }
  }
  throw lastErr;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── METEO ─────────────────────────────────────────────────────────────────────
function useMeteo(){
  const [meteo,setMeteo]=useState(null);
  useEffect(()=>{
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
        const d=await r.json();
        const temp=Math.round(d.current.temperature_2m);
        const code=d.current.weather_code;
        const icon=code<=1?"☀️":code<=3?"⛅":code<=48?"🌫️":code<=67?"🌧️":"⛈️";
        setMeteo({temp,icon});
      }catch{}
    },()=>{},{timeout:5000});
  },[]);
  return meteo;
}

function parseAIContent(text) {
  if(!text) return [{title:"Contenuto", content:"Contenuto non disponibile."}];
  const sections = [];
  const lines = text.split('\n');
  let current = null;

  for(const line of lines) {
    const trimmed = line.trim();
    if(trimmed.startsWith('## ') || trimmed.startsWith('### ') || trimmed.startsWith('# ')) {
      if(current) sections.push(current);
      current = {title: trimmed.replace(/^#+\s+/,''), content:''};
    } else if(!current) {
      current = {title:'Introduzione', content: trimmed + '\n'};
    } else {
      current.content += line + '\n';
    }
  }
  if(current) sections.push(current);
  if(sections.length === 0) sections.push({title:'Contenuto', content: text});

  return sections.map(s => ({
    ...s,
    content: s.content
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/`(.*?)`/g,`<span style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;color:#a8ff78;padding:2px 6px;border-radius:4px;font-size:13px">$1</span>`)
      .trim()
  }));
}

  const [offset,setOffset]=useState(0);
  const [animating,setAnimating]=useState(false);
  const W=useRef(375);
  useEffect(()=>{if(containerRef.current)W.current=containerRef.current.offsetWidth;},[]);
  const onTS=e=>{if(animating)return;startX.current=e.touches[0].clientX;startY.current=e.touches[0].clientY;isDragging.current=false;hasMoved.current=false;};
  const onTM=e=>{if(startX.current===null)return;const dx=e.touches[0].clientX-startX.current,dy=Math.abs(e.touches[0].clientY-startY.current);if(!isDragging.current){if(dy>Math.abs(dx)||Math.abs(dx)<8)return;isDragging.current=true;}e.preventDefault();hasMoved.current=Math.abs(dx)>12;currentX.current=dx;setOffset(dx);};
  const onTE=()=>{if(!isDragging.current){startX.current=null;return;}const dx=currentX.current,thr=W.current*0.28;setAnimating(true);if(dx<-thr){setOffset(-W.current);setTimeout(()=>{const n=addMonths(year,month,1);onMonthChange(n.year,n.month);setOffset(0);setAnimating(false);},280);}else if(dx>thr){setOffset(W.current);setTimeout(()=>{const n=addMonths(year,month,-1);onMonthChange(n.year,n.month);setOffset(0);setAnimating(false);},280);}else{setOffset(0);setTimeout(()=>setAnimating(false),280);}startX.current=null;isDragging.current=false;currentX.current=0;};
  const handleDayClick=useCallback((key)=>{if(!hasMoved.current&&!animating)onDay(key);},[animating,onDay]);
  const prev=addMonths(year,month,-1);
  const next=addMonths(year,month,1);
  return (
    <div ref={containerRef} style={{overflow:"hidden",touchAction:"pan-y"}} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
      <div style={{display:"flex",width:"300%",transform:`translateX(calc(-33.333% + ${offset}px))`,transition:animating?"transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94)":"none",willChange:"transform"}}>
        <div style={{width:"33.333%",flexShrink:0}}><MonthGrid year={prev.year} month={prev.month} events={events} alerts={alerts} onDay={handleDayClick}/></div>
        <div style={{width:"33.333%",flexShrink:0}}><MonthGrid year={year} month={month} events={events} alerts={alerts} onDay={handleDayClick}/></div>
        <div style={{width:"33.333%",flexShrink:0}}><MonthGrid year={next.year} month={next.month} events={events} alerts={alerts} onDay={handleDayClick}/></div>
      </div>
    </div>
  );
}

function MonthGrid({year,month,events,alerts,onDay}){
  const {dark}=React.useContext(ThemeCtx);
  const fd=firstDay(year,month),td=daysIn(year,month);
  const getDay=k=>events[k]||[];
  return (
    <div style={{padding:"0 4px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:"6px"}}>
        {DAYS.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:"10px",fontWeight:"700",color:i>=5?"var(--orange)":"var(--text3)",padding:"4px 0",letterSpacing:"0.05em"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",rowGap:"2px"}}>
        {Array.from({length:fd},(_,i)=><div key={`e${i}`}/>)}
        {Array.from({length:td},(_,i)=>{
          const day=i+1,key=fmt(year,month,day);
          const evs=getDay(key),isT=key===todayStr,isW=(fd+i)%7>=5;
          const isPast=key<todayStr;
          const cats=[...new Set(evs.map(e=>e.category))].slice(0,3);
          const hasAl=alerts.some(a=>a.day===key);
          const diff=daysBetween(key);
          return (
            <div key={key} onClick={()=>onDay(key)} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",borderRadius:"10px",WebkitTapHighlightColor:"transparent",transition:"background 0.15s",background:evs.length>0&&!isT?"rgba(124,111,255,0.06)":"transparent"}}>
              {isT&&<div style={{position:"absolute",inset:"8%",borderRadius:"8px",background:"linear-gradient(135deg,#7c6fff,#ff6b9d)"}}/>}
              {hasAl&&!isT&&<div style={{position:"absolute",inset:"8%",borderRadius:"8px",border:"1.5px solid var(--red)"}}/>}
              <div style={{fontSize:"14px",fontWeight:isT?"700":"500",color:isT?"#fff":isPast?"var(--text3)":isW?"var(--orange)":"var(--text)",position:"relative",zIndex:1,lineHeight:1,marginBottom:cats.length?"3px":"0",fontFamily:isT?"'Sora',sans-serif":"inherit"}}>{day}</div>
              {cats.length>0&&<div style={{display:"flex",gap:"2px",position:"relative",zIndex:1}}>{cats.map(cid=><div key={cid} style={{width:"4px",height:"4px",borderRadius:"50%",background:isT?"rgba(255,255,255,0.8)":getCat(cid).color}}/>)}</div>}
              {!isT&&diff>0&&diff<=5&&evs.some(e=>e.category==="verifica")&&(
                <div style={{position:"absolute",top:"-1px",right:"-1px",background:"var(--red)",borderRadius:"5px",padding:"1px 3px",fontSize:"8px",fontWeight:"700",color:"#fff",zIndex:2,lineHeight:1}}>{diff}g</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

    // 1. Pulizia aggressiva

      .replace(/```json\s*/gi,"").replace(/```\s*/g,"")  // rimuovi backtick
      .replace(/^\s*[\w\s,]*?(\[)/,"$1")                 // rimuovi testo prima di [
      .trim();

    // 2. Estrai solo la parte JSON tra [ e ]
    const start = s.indexOf('[');
    const end = s.lastIndexOf(']');
    if(start >= 0 && end > start) s = s.slice(start, end+1);

    // 3. Prova parse diretto
    try{ return JSON.parse(s); }catch{}

    // 4. Fix errori comuni: virgole mancanti, virgolette, trailing commas
    try{

        .replace(/,\s*]/g,"]")           // trailing comma array

                    <span style={{fontSize:"11px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>{checklist.filter(c=>c.done).length}/{checklist.length}</span>
                  </div>
                  {checklist.map((c,i)=>(
                    <div key={i} onClick={()=>setChecklist(p=>p.map((x,j)=>j===i?{...x,done:!x.done}:x))}
                      style={{padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:"10px",borderBottom:i<checklist.length-1?"1px solid var(--border2)":"none",cursor:"pointer",background:c.done?"rgba(38,222,129,0.04)":"transparent"}}>
                      <div style={{width:"20px",height:"20px",borderRadius:"6px",border:`2px solid ${c.done?"#26de81":"var(--border)"}`,background:c.done?"#26de81":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:"1px",transition:"all 0.15s"}}>
                        {c.done&&<span style={{color:"#fff",fontSize:"11px",fontWeight:"700"}}>✓</span>}
                      </div>
                      <span style={{fontSize:"13px",color:c.done?"var(--text3)":"var(--text)",textDecoration:c.done?"line-through":"none",lineHeight:1.4,flex:1}}>{c.text}</span>
                    </div>
                  ))}
                  {checklist.every(c=>c.done)&&(
                    <div style={{padding:"12px",textAlign:"center",background:"rgba(38,222,129,0.08)",borderTop:"1px solid rgba(38,222,129,0.15)"}}>
                      <span style={{fontSize:"13px",fontWeight:"700",color:"#26de81"}}>🎉 Sei pronto/a per la verifica!</span>
                    </div>
                  )}
                </div>
              )}

              {/* Scheda testo */}
              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"14px",marginBottom:"10px",border:"1px solid var(--border2)"}}>
                <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"0.06em",color:"var(--text3)",marginBottom:"10px"}}>SCHEDA COMPLETA</div>
                <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.75,maxHeight:"500px",overflowY:"auto"}}
                  dangerouslySetInnerHTML={{__html:aiText
                    .replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--text);font-weight:700">$1</strong>')
                    .replace(/^## (.*)/gm,'<div style="font-size:14px;font-weight:800;color:var(--accent);margin:16px 0 8px;padding-top:4px;border-top:1px solid var(--border2)">$1</div>')
                    .replace(/^### (.*)/gm,'<div style="font-size:13px;font-weight:700;color:var(--text);margin:10px 0 4px">$1</div>')
                    .replace(/^[-•] (.*)/gm,'<div style="padding:2px 0 2px 14px;position:relative"><span style="position:absolute;left:0;color:var(--accent)">•</span>$1</div>')
                    .replace(/^(\d+)\. (.*)/gm,'<div style="padding:2px 0 2px 18px;position:relative"><span style="position:absolute;left:0;color:var(--accent);font-weight:700;font-size:11px">$1.</span>$2</div>')
                  }}
                />
              </div>

              <button onClick={()=>setStep("menu")} className="btn-ghost" style={{width:"100%",fontSize:"13px"}}>← Torna al menu</button>
            </div>
          )}

          {/* ─── FLASHCARD ─── */}
          {step==="flashcards"&&flashcards.length>0&&(
            <div className="fade-up" style={{paddingTop:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                <span style={{fontSize:"12px",fontWeight:"700",color:"var(--green)"}}>🃏 FLASHCARD</span>
                <span style={{fontSize:"12px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>{fcIndice+1} / {flashcards.length}</span>
              </div>
              <div className="progress-bar" style={{marginBottom:"16px"}}><div className="progress-fill" style={{width:`${((fcIndice+1)/flashcards.length)*100}%`,background:"linear-gradient(90deg,#26de81,#20bf6b)"}}/></div>

              {/* La carta */}
              <div onClick={()=>setFcFlipped(f=>!f)} style={{background:fcFlipped?"linear-gradient(135deg,rgba(38,222,129,0.12),rgba(32,191,107,0.08))":"var(--bg3)",border:`2px solid ${fcFlipped?"rgba(38,222,129,0.3)":"var(--border)"}`,borderRadius:"20px",padding:"28px 20px",minHeight:"160px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",cursor:"pointer",transition:"all 0.3s",marginBottom:"14px",gap:"10px"}}>
                <div style={{fontSize:"11px",fontWeight:"800",letterSpacing:"0.08em",color:fcFlipped?"#26de81":"var(--text3)"}}>{fcFlipped?"DEFINIZIONE":"TERMINE"}</div>
                <div style={{fontSize:fcFlipped?"14px":"22px",fontWeight:fcFlipped?"500":"800",color:"var(--text)",lineHeight:1.4}}>
                  {fcFlipped?flashcards[fcIndice].back:flashcards[fcIndice].front}
                </div>
                {!fcFlipped&&<div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}}>Tocca per vedere la definizione</div>}
              </div>

              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{setFcFlipped(false);setFcIndice(i=>Math.max(0,i-1));}} disabled={fcIndice===0} style={{flex:1,padding:"11px",borderRadius:"12px",border:"1px solid var(--border2)",background:"var(--bg3)",color:fcIndice===0?"var(--text3)":"var(--text)",fontFamily:"'Sora',sans-serif",fontSize:"13px",fontWeight:"600",cursor:fcIndice===0?"default":"pointer"}}>‹ Indietro</button>
                {fcIndice<flashcards.length-1
                  ?<button onClick={()=>{setFcFlipped(false);setFcIndice(i=>i+1);}} style={{flex:2,padding:"11px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,#26de81,#20bf6b)",color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:"13px",fontWeight:"700",cursor:"pointer"}}>Avanti →</button>
                  :<button onClick={()=>setStep("menu")} style={{flex:2,padding:"11px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,var(--accent),var(--accent2))",color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:"13px",fontWeight:"700",cursor:"pointer"}}>🎉 Finito!</button>
                }
              </div>
              <button onClick={()=>setStep("scheda")} className="btn-ghost" style={{width:"100%",marginTop:"8px",fontSize:"12px"}}>← Torna alla scheda</button>
            </div>
          )}

          {/* ─── QUIZ SETUP ─── */}
          {step==="quiz-setup"&&(
            <div className="fade-up" style={{paddingTop:"14px"}}>
              {err&&<div style={{background:"rgba(255,77,109,0.08)",border:"1px solid rgba(255,77,109,0.2)",borderRadius:"12px",padding:"12px 14px",marginBottom:"12px",fontSize:"13px",color:"var(--red)",lineHeight:1.4}}>{err}</div>}
              <div style={{fontSize:"14px",fontWeight:"700",color:"var(--text)",marginBottom:"12px"}}>Com'è la tua preparazione su <em style={{fontStyle:"normal",color:"var(--accent)"}}>{arg}</em>?</div>
              {[{e:"😴",l:"Per niente",s:"Domande molto semplici"},{e:"😟",l:"Poco",s:"Concetti base"},{e:"😐",l:"Abbastanza",s:"Livello medio"},{e:"😊",l:"Bene",s:"Domande difficili"},{e:"🔥",l:"Pronto/a!",s:"Livello esame"}].map((x,i)=>(
                <div key={i} onClick={()=>setLivello(i+1)} style={{padding:"12px 14px",borderRadius:"14px",border:`2px solid ${livello===i+1?"var(--accent)":"var(--border2)"}`,background:livello===i+1?"rgba(124,111,255,0.08)":"var(--bg3)",cursor:"pointer",marginBottom:"7px",display:"flex",alignItems:"center",gap:"12px",transition:"all 0.15s"}}>
                  <span style={{fontSize:"22px",flexShrink:0}}>{x.e}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"14px",fontWeight:livello===i+1?"700":"500",color:livello===i+1?"var(--accent)":"var(--text)"}}>{x.l}</div>
                    <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"1px"}}>{x.s}</div>
                  </div>
                  {livello===i+1&&<div style={{width:"20px",height:"20px",borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:"11px"}}>✓</span></div>}
                </div>
              ))}
              <button onClick={generaQuiz} style={{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:"linear-gradient(135deg,#45aaf2,#3867d6)",color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:"15px",fontWeight:"700",cursor:"pointer",marginTop:"4px",marginBottom:"8px"}}>
                ✨ Genera Quiz con Claude
              </button>
              <button onClick={()=>setStep("menu")} className="btn-ghost" style={{width:"100%",fontSize:"13px"}}>← Indietro</button>
            </div>
          )}

          {/* ─── LOADING QUIZ ─── */}
          {step==="loading-quiz"&&(
            <div style={{padding:"32px 8px"}}>
              <div style={{textAlign:"center",marginBottom:"24px"}}>
                <div style={{fontSize:"54px",marginBottom:"12px"}} className="float">🎯</div>
                <div style={{fontSize:"17px",fontWeight:"700",color:"var(--text)",marginBottom:"6px"}}>Claude prepara il quiz…</div>
                <div style={{fontSize:"13px",color:"var(--blue)",fontWeight:"600",minHeight:"20px"}} className="pulse">{loadMsg}</div>
                <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}}>8 domande · 10-15 secondi</div>
              </div>
              <div style={{background:"var(--bg4)",borderRadius:"8px",height:"6px",overflow:"hidden",marginBottom:"18px"}}>
                <div style={{height:"100%",borderRadius:"8px",background:"linear-gradient(90deg,#45aaf2,#3867d6)",animation:"loadbar 2s ease-in-out infinite"}}/>
              </div>
              {[1,2,3,4,5,6,7,8].map(n=>(
                <div key={n} style={{padding:"9px 14px",borderRadius:"10px",background:"var(--bg3)",marginBottom:"5px",display:"flex",alignItems:"center",gap:"10px",border:"1px solid var(--border2)"}}>
                  <div style={{width:"22px",height:"22px",borderRadius:"50%",background:"rgba(69,170,242,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700",color:"var(--blue)",flexShrink:0}}>{n}</div>
                  <div style={{flex:1,height:"8px",borderRadius:"4px",background:"var(--bg4)",overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:"4px",background:`linear-gradient(90deg,#45aaf2,#3867d6)`,width:`${20+n*9}%`}}/>
                  </div>
                  <div style={{width:"13px",height:"13px",border:"2px solid var(--border)",borderTop:"2px solid #45aaf2",borderRadius:"50%",animation:`spin ${0.7+n*0.1}s linear infinite`,flexShrink:0}}/>
                </div>
              ))}
            </div>
          )}

          {/* ─── QUIZ (una domanda alla volta) ─── */}
          {step==="quiz"&&!tutteRisposte&&dCorr&&(
            <div className="fade-up">
              {/* Barra progresso */}
              <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"12px 0 10px"}}>
                <div style={{flex:1,height:"5px",borderRadius:"3px",background:"var(--bg4)",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:"3px",background:"linear-gradient(90deg,#45aaf2,#3867d6)",width:`${((quizIndice+1)/quizDomande.length)*100}%`,transition:"width 0.4s"}}/>
                </div>
                <span style={{fontSize:"12px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>{quizIndice+1}/{quizDomande.length}</span>
              </div>

              {/* Domanda */}
              <div style={{background:"var(--bg3)",borderRadius:"18px",padding:"18px",marginBottom:"12px",border:"1px solid var(--border2)"}}>
                <div style={{fontSize:"10px",fontWeight:"800",letterSpacing:"0.07em",color:"var(--blue)",marginBottom:"8px"}}>DOMANDA {quizIndice+1}</div>
                <div style={{fontSize:"16px",fontWeight:"600",color:"var(--text)",lineHeight:1.45}}>{dCorr.domanda}</div>
              </div>

              {/* Risposte */}
              <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"12px"}}>
                {dCorr.risposte.map((r,j)=>{
                  const isC=r===dCorr.corretta, isS=r===dCorr.scelta;
                  const answered=dCorr.scelta!==null;
                  let bg="var(--bg3)", border="var(--border2)", col="var(--text)";
                  if(answered){
                    if(isC){bg="rgba(38,222,129,0.12)";border="#26de81";col="#26de81";}
                    else if(isS){bg="rgba(255,77,109,0.1)";border="#ff4d6d";col="#ff4d6d";}
                  }
                  return (
                    <div key={j} onClick={()=>!answered&&rispondi(r)}
                      style={{padding:"13px 14px",borderRadius:"14px",border:`2px solid ${border}`,background:bg,cursor:answered?"default":"pointer",display:"flex",alignItems:"center",gap:"12px",transition:"all 0.2s"}}>
                      <div style={{width:"26px",height:"26px",borderRadius:"50%",background:answered?(isC?"#26de81":isS?"#ff4d6d":"var(--bg4)"):"rgba(69,170,242,0.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"12px",fontWeight:"800",color:answered?(isC||isS?"#fff":"var(--text3)"):"var(--blue)",transition:"all 0.2s"}}>
                        {answered?(isC?"✓":isS?"✗":String.fromCharCode(65+j)):String.fromCharCode(65+j)}
                      </div>
                      <span style={{fontSize:"14px",color:col,fontWeight:answered&&(isC||isS)?"600":"400",lineHeight:1.3,flex:1}}>{r}</span>
                    </div>
                  );
                })}
              </div>

              {/* Spiegazione */}
              {dCorr.scelta!==null&&(
                <div style={{background:dCorr.scelta===dCorr.corretta?"rgba(38,222,129,0.08)":"rgba(255,107,157,0.08)",border:`1px solid ${dCorr.scelta===dCorr.corretta?"rgba(38,222,129,0.25)":"rgba(255,107,157,0.25)"}`,borderRadius:"14px",padding:"14px",marginBottom:"12px"}}>
                  <div style={{fontSize:"13px",fontWeight:"800",color:dCorr.scelta===dCorr.corretta?"#26de81":"var(--accent2)",marginBottom:"5px"}}>
                    {dCorr.scelta===dCorr.corretta?"✅ Corretto!":"❌ Risposta sbagliata"}
                  </div>
                  {dCorr.scelta!==dCorr.corretta&&<div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"5px"}}>✅ Risposta corretta: <strong style={{color:"#26de81"}}>{dCorr.corretta}</strong></div>}
                  {dCorr.spiegazione&&<div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.5}}>{dCorr.spiegazione}</div>}
                </div>
              )}

              {/* Next / Prev */}
              {dCorr.scelta!==null&&(
                <div style={{display:"flex",gap:"8px"}}>
                  {quizIndice>0&&<button onClick={()=>{setQuizIndice(i=>i-1);}} className="btn-ghost" style={{flex:1,fontSize:"13px"}}>‹ Prec.</button>}
                  {quizIndice<quizDomande.length-1
                    ?<button onClick={()=>setQuizIndice(i=>i+1)} style={{flex:2,padding:"13px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,#45aaf2,#3867d6)",color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:"14px",fontWeight:"700",cursor:"pointer"}}>Prossima →</button>
                    :tutteRisposte
                      ?<button onClick={()=>setStep("quiz-result")} style={{flex:2,padding:"13px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,var(--accent),var(--accent2))",color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:"14px",fontWeight:"700",cursor:"pointer"}}>🏆 Vedi risultato</button>
                      :null
                  }
                </div>
              )}
            </div>
          )}

          {/* ─── RISULTATO QUIZ ─── */}
          {(step==="quiz"&&tutteRisposte||step==="quiz-result")&&tutteRisposte&&(
            <div className="fade-up" style={{paddingTop:"14px"}}>
              {/* Score card */}
              <div style={{background:"var(--bg3)",borderRadius:"20px",padding:"24px",textAlign:"center",marginBottom:"14px",border:`2px solid ${punteggio===quizDomande.length?"#26de81":punteggio>=quizDomande.length*0.75?"var(--accent)":punteggio>=quizDomande.length*0.5?"var(--orange)":"var(--red)"}`}}>
                <div style={{fontSize:"52px",marginBottom:"10px"}}>{punteggio===quizDomande.length?"🏆":punteggio>=quizDomande.length*0.75?"⭐":punteggio>=quizDomande.length*0.5?"💪":"📚"}</div>
                <div style={{fontSize:"36px",fontWeight:"800",color:"var(--text)",letterSpacing:"-1px",marginBottom:"4px"}}>{punteggio}<span style={{fontSize:"18px",color:"var(--text3)"}}>/{quizDomande.length}</span></div>
                <div style={{fontSize:"16px",fontWeight:"700",color:punteggio===quizDomande.length?"#26de81":punteggio>=quizDomande.length*0.75?"var(--accent)":punteggio>=quizDomande.length*0.5?"var(--orange)":"var(--red)",marginBottom:"6px"}}>
                  {punteggio===quizDomande.length?"Perfetto! Sei pronto/a!":punteggio>=quizDomande.length*0.75?"Ottimo! Quasi pronto/a":punteggio>=quizDomande.length*0.5?"Bene, ripassa i punti sbagliati":"Studia ancora, poi riprova!"}
                </div>
                <div style={{fontSize:"12px",color:"var(--text3)"}}>Livello: {["Facile","Facile","Medio","Difficile","Expert"][livello-1]}</div>
              </div>

              {/* Riepilogo errori */}
              {quizDomande.filter(d=>d.scelta!==d.corretta).length>0&&(
                <div style={{background:"var(--bg3)",borderRadius:"14px",overflow:"hidden",marginBottom:"12px",border:"1px solid var(--border2)"}}>
                  <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border2)"}}>
                    <span style={{fontSize:"12px",fontWeight:"700",color:"var(--red)",letterSpacing:"0.05em"}}>❌ DA RIPASSARE</span>
                  </div>
                  {quizDomande.filter(d=>d.scelta!==d.corretta).map((d,i,arr)=>(
                    <div key={i} style={{padding:"11px 14px",borderBottom:i<arr.length-1?"1px solid var(--border2)":"none"}}>
                      <div style={{fontSize:"13px",fontWeight:"600",color:"var(--text)",marginBottom:"3px",lineHeight:1.3}}>{d.domanda}</div>
                      <div style={{fontSize:"12px",color:"#26de81"}}>✅ {d.corretta}</div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                <button onClick={()=>{setQuizDomande(q=>q.map(d=>({...d,scelta:null})));setQuizIndice(0);setStep("quiz");}} className="btn-ghost" style={{flex:1,fontSize:"13px"}}>↺ Riprova</button>
                <button onClick={()=>{setQuizDomande([]);setStep("quiz-setup");}} style={{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,#45aaf2,#3867d6)",color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:"13px",fontWeight:"700",cursor:"pointer"}}>🎯 Nuovo quiz</button>
              </div>
              <button onClick={()=>setStep("menu")} className="btn-ghost" style={{width:"100%",fontSize:"13px"}}>← Menu ripasso</button>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

  const mat=MATERIE.find(m=>m.id===event.materia)||MATERIE[MATERIE.length-1];
  const matLabel=event.materia==="altra"?(event.customMateria||"Materia"):mat.label;
  const arg=event.argomento||matLabel;
  const tipo=event.tipoVerifica||"Verifica";

  // ── Genera scheda studio ──
  const generaScheda=async()=>{
    setStep("loading-scheda");
    setAiText("");
    setErr("");

    // Messaggi di progresso animati mentre Claude lavora
    const msgs=["📚 Analizzo l'argomento…","✍️ Scrivo le definizioni chiave…","📐 Preparo regole e formule…","💡 Organizzo i concetti…","✅ Finisco la checklist…"];
    let mi=0;
    setLoadMsg(msgs[0]);
    const ticker=setInterval(()=>{ mi=(mi+1)%msgs.length; setLoadMsg(msgs[mi]); },2200);

    try{
      const prompt=`Sei un professore italiano esperto di ${matLabel}. Prepara una scheda di studio COMPLETA per una ${tipo} su: "${arg}".

Usa ESATTAMENTE queste sezioni con ## come titolo:

## 📌 Definizioni Chiave
Per ogni termine importante scrivi: **Termine**: definizione chiara e semplice. Almeno 5-8 termini.

## 📐 Regole e Formule
Tutte le regole, formule, leggi da sapere. Sii specifico e preciso. Includi esempi numerici se rilevante.

## 📅 Date e Fatti da Ricordare
Date storiche, numeri, dati statistici, eventi importanti legati all'argomento.

## 💡 Concetti Fondamentali
Spiega i 4-6 concetti più importanti in modo chiaro, con esempi concreti tratti dalla vita reale.

## ⚠️ Errori Comuni da Evitare
I 5 errori tipici degli studenti su questo argomento e come non commetterli.

## ✅ Checklist Pre-${tipo}
Lista di 8-10 punti: "So spiegare…", "So calcolare…", "Conosco…" — da spuntare prima della verifica.

## 🎯 Trucchi per Ricordare
Acronimi, mnemotecniche, associazioni mentali, analogie utili per memorizzare.

Scrivi in italiano. Sii dettagliato, pratico, con esempi reali. Minimo 600 parole.`;

      const text = await callClaude(prompt, 2500);
      clearInterval(ticker);
      setAiText(text);
      setStep("scheda");
    }catch(e){
      clearInterval(ticker);
      setErr("Errore: "+e.message+". Controlla la connessione e riprova.");
      setStep("menu");
    }
  };

  // ── Apri PDF ──
  const apriPDF=()=>{
    const html=generateStudyPDF(event.materia, arg, tipo, aiText);
    const blob=new Blob([html],{type:"text/html"});
    window.open(URL.createObjectURL(blob),"_blank");
  };

  // ── Genera Quiz ──
  const generaQuiz=async()=>{
    setStep("loading-quiz");
    setErr("");

    const msgs=["🎯 Preparo le domande…","🧠 Scelgo gli argomenti chiave…","✍️ Scrivo le risposte…","🔀 Mescolo le opzioni…"];
    let mi=0;
    setLoadMsg(msgs[0]);
    const ticker=setInterval(()=>{ mi=(mi+1)%msgs.length; setLoadMsg(msgs[mi]); },1800);

    try{
      const diff=livello<=2?"molto semplici, su concetti base":livello===3?"di media difficoltà, su concetti principali":livello===4?"difficili, con applicazioni e ragionamento":"molto difficili, approfondite e con dettagli tecnici";

// ── MODAL EVENTO ──────────────────────────────────────────────────────────────
function Modal({dayKey,onClose,onSave,editEvent}){
  const {dark}=React.useContext(ThemeCtx);
  const [step,setStep]=useState(editEvent?"details":"category");
  const [cat,setCat]=useState(editEvent?.category||null);
  const [materia,setMat]=useState(editEvent?.materia||null);
  const [cMat,setCMat]=useState(editEvent?.customMateria||"");
  const [arg,setArg]=useState(editEvent?.argomento||"");
  const [tipo,setTipo]=useState(editEvent?.tipoVerifica||"");
  const [name,setName]=useState(editEvent?.personName||"");
  const [age,setAge]=useState(editEvent?.personAge||"");
  const [sugg,setSugg]=useState(editEvent?.selectedSugg||null);
  const [ctitle,setCtitle]=useState(editEvent?.customTitle||"");
  const [time,setTime]=useState(editEvent?.time||"");
  const [note,setNote]=useState(editEvent?.note||"");
  const [vis,setVis]=useState(false);
  useEffect(()=>{requestAnimationFrame(()=>setVis(true))},[]);
  const close=()=>{setVis(false);setTimeout(onClose,320)};
  const C=CATS.find(c=>c.id===cat);
  const [,km,kd]=dayKey.split("-");

  const SUGG_MAP={
    commissione:[{label:"Fare la spesa",emoji:"🛒"},{label:"Farmacia",emoji:"💊"},{label:"Pagare bollette",emoji:"💰"},{label:"Posta",emoji:"📮"},{label:"Ritirare pacco",emoji:"📦"},{label:"Banca / ATM",emoji:"🏦"},{label:"Meccanico",emoji:"🔧"},{label:"Shopping",emoji:"🛍️"},{label:"Veterinario",emoji:"🐾"},{label:"Altro",emoji:"✏️"}],
    appuntamento:[{label:"Medico di base",emoji:"👨‍⚕️"},{label:"Dentista",emoji:"🦷"},{label:"Specialista",emoji:"🏥"},{label:"Fisioterapia",emoji:"💆"},{label:"Analisi sangue",emoji:"🩸"},{label:"Oculista",emoji:"👁️"},{label:"Colloquio scuola",emoji:"🏫"},{label:"Colloquio lavoro",emoji:"👔"},{label:"Parrucchiere",emoji:"✂️"},{label:"Altro",emoji:"✏️"}],
    todo:[{label:"Studiare",emoji:"📚"},{label:"Fare sport",emoji:"🏃"},{label:"Chiamare qualcuno",emoji:"📞"},{label:"Pulire casa",emoji:"🧹"},{label:"Cucinare",emoji:"🍳"},{label:"Leggere",emoji:"📖"},{label:"Organizzare",emoji:"🗂️"},{label:"Progetto",emoji:"💡"},{label:"Altro",emoji:"✏️"}],
  };

  const buildTitle=()=>{
    if(cat==="verifica"){const m=MATERIE.find(x=>x.id===materia);const ml=materia==="altra"?cMat:m?.label;return arg?`${m?.emoji||"📚"} ${tipo||"Verifica"} ${ml} — ${arg}`:`${m?.emoji||"📚"} ${tipo||"Verifica"} di ${ml}`;}
    if(cat==="compleanno")return `🎂 Compleanno di ${name}${age?` (${age} anni)`:""}`;
    return sugg==="Altro"?ctitle:(sugg||"");
  };

  const ok=()=>{
    if(step==="argomento")return materia!=="altra"||cMat.trim();
    if(step==="compleanno")return name.trim();
    if(step==="suggerimenti")return sugg&&(sugg!=="Altro"||ctitle.trim());
    return true;
  };

  const save=()=>{const t=buildTitle();if(!t.trim())return;onSave({id:editEvent?.id||Date.now(),category:cat,title:t,time,note,materia,customMateria:cMat,argomento:arg,tipoVerifica:tipo,personName:name,personAge:age,selectedSugg:sugg,customTitle:ctitle});close();};
  const steps=cat==="verifica"?["category","materia","argomento","details"]:cat==="compleanno"?["category","compleanno","details"]:["category","suggerimenti","details"];
  const si=steps.indexOf(step);

  return (
    <div onClick={e=>e.target===e.currentTarget&&close()} style={{position:"fixed",inset:0,zIndex:400,background:vis?"rgba(0,0,0,0.6)":"rgba(0,0,0,0)",backdropFilter:"blur(12px)",transition:"all 0.3s",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div style={{background:"var(--bg2)",borderRadius:"24px 24px 0 0",maxHeight:"92vh",overflowY:"auto",paddingBottom:"env(safe-area-inset-bottom,20px)",transform:vis?"translateY(0)":"translateY(100%)",transition:"transform 0.4s cubic-bezier(0.32,0.72,0,1)"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}><div style={{width:"40px",height:"4px",background:"var(--border)",borderRadius:"2px"}}/></div>
        <div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--border2)"}}>
          <div>
            <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"4px",fontWeight:"600",letterSpacing:"0.04em"}}>{parseInt(kd)} {MONTHS[parseInt(km)-1]}</div>
            <div style={{fontSize:"20px",fontWeight:"700",color:"var(--text)"}}>{C?`${C.emoji} ${C.label}`:"Nuovo evento"}</div>
          </div>
          <button onClick={close} style={{background:"var(--bg3)",border:"none",borderRadius:"50%",width:"32px",height:"32px",cursor:"pointer",color:"var(--text2)",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {cat&&(
          <div style={{display:"flex",gap:"3px",padding:"10px 20px"}}>
            {steps.map((s,i)=><div key={s} style={{height:"3px",flex:1,borderRadius:"2px",background:i<=si?C?.color||"var(--accent)":"var(--bg4)",transition:"background 0.3s"}}/>)}
          </div>
        )}

        <div style={{padding:"8px 16px 20px"}}>

          {step==="category"&&(
            <div className="fade-up">
              {CATS.map(c=>(
                <div key={c.id} className="tap" onClick={()=>{setCat(c.id);c.id==="verifica"?setStep("materia"):c.id==="compleanno"?setStep("compleanno"):setStep("suggerimenti")}}
                  style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:"16px",padding:"16px",marginBottom:"8px",display:"flex",alignItems:"center",gap:"14px",cursor:"pointer",transition:"all 0.15s"}}>
                  <div style={{width:"48px",height:"48px",borderRadius:"14px",background:c.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",flexShrink:0}}>{c.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"700",fontSize:"16px",color:"var(--text)",marginBottom:"2px"}}>{c.label}</div>
                    <div style={{fontSize:"12px",color:"var(--text2)"}}>
                      {c.id==="verifica"&&"📚 Scheda studio + Quiz AI"}{c.id==="compleanno"&&"🎉 Promemoria compleanno"}
                      {c.id==="commissione"&&"🛒 Lista spesa AI"}{c.id==="appuntamento"&&"📋 Guida preparazione AI"}
                      {c.id==="todo"&&"✅ Piano azione AI"}
                    </div>
                  </div>
                  <div style={{fontSize:"20px",color:"var(--text3)"}}>›</div>
                </div>
              ))}
            </div>
          )}

          {step==="materia"&&(
            <div className="fade-up">
              <button onClick={()=>setStep("category")} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:"14px",color:"var(--accent)",padding:"0 0 14px",display:"block",fontWeight:"600"}}>‹ Indietro</button>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
                {MATERIE.map(m=>(
                  <div key={m.id} className="tap" onClick={()=>{setMat(m.id);setStep("argomento")}}
                    style={{background:materia===m.id?"var(--accent)":"var(--bg3)",borderRadius:"14px",padding:"14px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",border:`1px solid ${materia===m.id?"var(--accent)":"var(--border2)"}`,transition:"all 0.15s"}}>
                    <span style={{fontSize:"24px"}}>{m.emoji}</span>
                    <span style={{fontSize:"11px",textAlign:"center",color:materia===m.id?"#fff":"var(--text)",fontWeight:"600",lineHeight:1.2}}>{m.label}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {step==="argomento"&&(
            <div className="fade-up">
              <button onClick={()=>setStep("materia")} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:"14px",color:"var(--accent)",padding:"0 0 14px",display:"block",fontWeight:"600"}}>‹ Indietro</button>
              {materia==="altra"&&(
                <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"10px",border:"1px solid var(--border2)"}}>
                  <label style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:"6px"}}>Materia</label>
                  <input value={cMat} onChange={e=>setCMat(e.target.value)} placeholder="Es. Diritto, Economia…" className="inp" style={{background:"transparent",border:"none",padding:"0"}} autoFocus/>
                </div>
              )}
              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"14px 16px",marginBottom:"10px",border:"1px solid var(--border2)"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:"8px"}}>Tipo di verifica</label>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                  {TIPI.map(t=>(
                    <button key={t} onClick={()=>setTipo(tipo===t?"":t)}
                      style={{padding:"7px 14px",borderRadius:"20px",fontFamily:"'Sora',sans-serif",border:"none",background:tipo===t?C?.color||"var(--accent)":"var(--bg4)",color:tipo===t?"#fff":"var(--text2)",fontSize:"13px",fontWeight:"600",cursor:"pointer",transition:"all 0.15s"}}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"12px",border:"1px solid var(--border2)"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:"6px"}}>Argomento <span style={{fontWeight:"400",opacity:0.5}}>(opzionale)</span></label>
                <input value={arg} onChange={e=>setArg(e.target.value)} placeholder="Es. Equazioni, Risorgimento, DNA…" className="inp" style={{background:"transparent",border:"none",padding:"0"}}/>
              </div>
              <button onClick={()=>ok()&&setStep("details")} style={{width:"100%",padding:"15px",borderRadius:"14px",border:"none",background:ok()?C?.grad||"var(--accent)":"var(--bg3)",color:ok()?"#fff":"var(--text3)",fontFamily:"'Sora',sans-serif",fontSize:"15px",fontWeight:"700",cursor:ok()?"pointer":"default",transition:"all 0.2s"}}>Continua →</button>
            </div>
          )}

          {step==="compleanno"&&(
            <div className="fade-up">
              <button onClick={()=>setStep("category")} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:"14px",color:"var(--accent)",padding:"0 0 14px",display:"block",fontWeight:"600"}}>‹ Indietro</button>
              <div style={{textAlign:"center",fontSize:"56px",margin:"8px 0 16px"}} className="float">🎂</div>
              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"10px"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:"6px"}}>Nome</label>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="Es. Marco, Giulia…" className="inp" style={{background:"transparent",border:"none",padding:"0"}} autoFocus/>
              </div>
              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"14px"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:"6px"}}>Quanti anni?</label>
                <input value={age} onChange={e=>setAge(e.target.value)} placeholder="Es. 18" className="inp" style={{background:"transparent",border:"none",padding:"0"}} type="number"/>
              </div>
              <button onClick={()=>name.trim()&&setStep("details")} style={{width:"100%",padding:"15px",borderRadius:"14px",border:"none",background:name.trim()?"#ff9f43":"var(--bg3)",color:name.trim()?"#fff":"var(--text3)",fontFamily:"'Sora',sans-serif",fontSize:"15px",fontWeight:"700",cursor:name.trim()?"pointer":"default"}}>Continua →</button>
            </div>
          )}

          {step==="suggerimenti"&&(
            <div className="fade-up">
              <button onClick={()=>setStep("category")} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:"14px",color:"var(--accent)",padding:"0 0 12px",display:"block",fontWeight:"600"}}>‹ Indietro</button>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                {SUGG_MAP[cat]?.map(s=>(
                  <div key={s.label} className="tap" onClick={()=>setSugg(s.label)}
                    style={{background:sugg===s.label?C?.grad||"var(--accent)":"var(--bg3)",borderRadius:"14px",padding:"14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",border:`1px solid ${sugg===s.label?"transparent":"var(--border2)"}`,transition:"all 0.15s"}}>
                    <span style={{fontSize:"22px"}}>{s.emoji}</span>
                    <span style={{fontSize:"13px",fontWeight:"600",color:sugg===s.label?"#fff":"var(--text)",lineHeight:1.2}}>{s.label}</span>
                  </div>
                ))}
              </div>
              {sugg==="Altro"&&(
                <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"10px"}}>
                  <input value={ctitle} onChange={e=>setCtitle(e.target.value)} placeholder="Scrivi cosa devi fare…" className="inp" style={{background:"transparent",border:"none",padding:"0"}} autoFocus/>
                </div>
              )}
              <button onClick={()=>ok()&&setStep("details")} style={{width:"100%",padding:"15px",borderRadius:"14px",border:"none",background:ok()?C?.grad||"var(--accent)":"var(--bg3)",color:ok()?"#fff":"var(--text3)",fontFamily:"'Sora',sans-serif",fontSize:"15px",fontWeight:"700",cursor:ok()?"pointer":"default"}}>Continua →</button>
            </div>

          {step==="details"&&(
            <div className="fade-up">

              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"14px 16px",marginBottom:"10px",borderLeft:`4px solid ${C?.color||"var(--accent)"}`}}>
                <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"700",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.04em"}}>{C?.label}</div>
                <div style={{fontWeight:"700",fontSize:"15px",color:"var(--text)",lineHeight:1.3}}>{buildTitle()}</div>
              </div>
              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"8px"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:"6px"}}>Orario</label>
                <input type="time" value={time} onChange={e=>setTime(e.target.value)} className="inp" style={{background:"transparent",border:"none",padding:"0",colorScheme:"dark"}}/>
              </div>
              <div style={{background:"var(--bg3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"14px"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:"6px"}}>Note</label>

              </div>
              <button onClick={save} style={{width:"100%",padding:"15px",borderRadius:"14px",border:"none",background:C?.grad||"linear-gradient(135deg,var(--accent),var(--accent2))",color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>
                ✓ Salva evento
              </button>
            </div>
          )}
        </div>
      </div>

                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:"600",fontSize:"14px",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                        <div style={{fontSize:"11px",color:"var(--text2)",marginTop:"2px",display:"flex",alignItems:"center",gap:"5px"}}>
                          <span style={{color:c.color,fontWeight:"600"}}>{c.label}</span>
                          {ev.time&&<span>· {ev.time}</span>}
                          {ev.category==="verifica"&&d>0&&d<=7&&<span style={{background:"var(--red)",color:"#fff",borderRadius:"5px",padding:"1px 5px",fontSize:"10px",fontWeight:"700"}}>-{d}g</span>}
                        </div>
                      </div>
                      <button onClick={()=>delEv(ev.day,ev.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:"22px",padding:"4px"}}>×</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* BOTTOM WEEK BAR */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:dark?"rgba(8,8,15,0.97)":"rgba(247,247,255,0.97)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid var(--border2)",padding:"8px 10px env(safe-area-inset-bottom,18px)",zIndex:150}}>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          {wDays.map((d,i)=>{
            const key=fmt(d.getFullYear(),d.getMonth(),d.getDate()),evs=getDay(key),isT=key===todayStr,hasAl=alerts.some(a=>a.day===key);
            return (
              <div key={i} className="tap" onClick={()=>setSelDay(key)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"3px 1px",cursor:"pointer",position:"relative"}}>
                {hasAl&&!isT&&<div style={{position:"absolute",top:"0",right:"4px",width:"5px",height:"5px",borderRadius:"50%",background:"var(--red)"}}/>}
                <div style={{fontSize:"10px",fontWeight:"700",color:isT?"var(--accent)":"var(--text3)",marginBottom:"4px",letterSpacing:"0.04em"}}>{DAYS[i]}</div>
                <div style={{width:"32px",height:"32px",borderRadius:"10px",background:isT?"linear-gradient(135deg,var(--accent),var(--accent2))":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
                  <div style={{fontSize:"15px",fontWeight:isT?"800":"500",color:isT?"#fff":i>=5?"var(--orange)":"var(--text)"}}>{d.getDate()}</div>
                </div>
                <div style={{display:"flex",gap:"2px",marginTop:"3px",height:"4px",alignItems:"center"}}>
                  {evs.slice(0,3).map((ev,j)=><div key={j} style={{width:"4px",height:"4px",borderRadius:"50%",background:isT?"rgba(255,255,255,0.7)":getCat(ev.category).color}}/>)}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {showAl&&<AlertsPanel alerts={alerts} onClose={()=>setShowAl(false)} onGo={day=>{setSelDay(day);setMonth(parseInt(day.split("-")[1])-1);setYear(parseInt(day.split("-")[0]));setView("month");}}/>}
      {selDay&&!showModal&&!showAl&&<DaySheet dayKey={selDay} events={getDay(selDay)} onAdd={()=>{setEditEv(null);setShowModal(true)}} onEdit={ev=>{setEditEv(ev);setShowModal(true)}} onDel={id=>delEv(selDay,id)} onClose={()=>setSelDay(null)}/>}
      {showModal&&selDay&&<Modal dayKey={selDay} onClose={()=>setShowModal(false)} onSave={handleSave} editEvent={editEv}/>}
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
